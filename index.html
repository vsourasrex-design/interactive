<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🦖 Dino Adventure</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="hero">
      <h1>🦖 Dino Adventure 🦕</h1>
      <p>
        Stomp, roar, and explore the prehistoric world of dinosaurs!
      </p>
    </header>

    <main>
      <section class="dino-gallery">
        <div class="card trex">
          <img src="./assets/images/trex.jpg" alt="T-Rex" />
          <p>The mighty T-Rex roars loudly!</p>
        </div>

        <div class="card triceratops">
          <img src="./assets/images/Triceratops.jpg" alt="Triceratops" />
          <p>The strong Triceratops charges ahead!</p>
        </div>

        <div class="card volcano">
          <img src="./assets/images/volcano.jpg" alt="Volcano" />
          <p>A volcano erupts in the distance!</p>
        </div>
      </section>

      <section class="cta">
        <button class="btn">Enter the Dino World 🌋</button>
      </section>
    </main>

    <footer>
      <p>🌿 Welcome to the Jurassic Era! 🦴</p>
    </footer>
  </body>
</html>
